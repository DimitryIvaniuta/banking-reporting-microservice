# Banking Reporting Microservice reverse proxy (Docker Desktop / Windows host app)

ServerName localhost
ProxyRequests Off
ProxyPreserveHost On

# Forwarded headers (TLS terminates at Apache in production)
RequestHeader set X-Forwarded-Proto "http"
RequestHeader set X-Forwarded-Port "8088"
RequestHeader unset Proxy early

# Security headers
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set X-XSS-Protection "0"
Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'"

# Basic request hardening
LimitRequestBody 10485760
LimitRequestFields 50
LimitRequestFieldSize 8190

# App traffic (Spring Boot app is on host port 8080 by default)
ProxyPass        /api/       http://host.docker.internal:8080/api/ retry=0 connectiontimeout=5 timeout=30
ProxyPassReverse /api/       http://host.docker.internal:8080/api/

# Local/dev only - restrict in production
ProxyPass        /actuator/  http://host.docker.internal:8080/actuator/ retry=0 connectiontimeout=5 timeout=30
ProxyPassReverse /actuator/  http://host.docker.internal:8080/actuator/

# Default deny other paths for safety (optional local hardening)
<Location "/">
    Require all denied
</Location>
