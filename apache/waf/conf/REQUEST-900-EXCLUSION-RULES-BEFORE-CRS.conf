# BRMS local CRS exclusions / tuning (DetectionOnly rollout)
# Keep changes minimal until reviewing audit logs.

# JSON API endpoints
SecRule REQUEST_URI "@beginsWith /api/" \
  "id:900100,phase:1,pass,nolog,ctl:requestBodyProcessor=JSON"

# Increase body size for report filters/payloads if needed (still bounded by Apache edge limits)
SecAction "id:900110,phase:1,pass,nolog,setvar:tx.request_body_limit=10485760"

