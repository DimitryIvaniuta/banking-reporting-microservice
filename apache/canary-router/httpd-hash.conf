ServerRoot "/usr/local/apache2"
Listen 80
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule headers_module modules/mod_headers.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
LoadModule lua_module modules/mod_lua.so
ServerName localhost
PidFile /tmp/httpd.pid
User daemon
Group daemon
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# Deterministic canary on top of sticky routing.
# - QA override (optional): X-Canary-Force: block|detect (applied only when no sticky cookie exists)
# - Hash key precedence: X-Canary-Key -> X-User-Id -> X-Forwarded-For -> client IP
# - First request gets deterministic route (detect/block) based on hash bucket + percentage threshold
# - Injects BRMSWAFID cookie into request and sets sticky cookie on response
# - Existing BRMSWAFID cookie is respected (sticky session)
# Default threshold: 10% block canary; tune via SetEnv CANARY_BLOCK_PERCENT
SetEnv CANARY_BLOCK_PERCENT 10
LuaScope thread
LuaHookFixups /usr/local/apache2/conf/lua/hash_canary.lua canary_fixups

<Proxy "balancer://waf_cluster">
  # Equal weights because Lua chooses route deterministically and injects sticky cookie.
  BalancerMember "http://apache-httpd-waf-detect:8080" route=detect loadfactor=1
  BalancerMember "http://apache-httpd-waf-block:8080" route=block loadfactor=1
  ProxySet lbmethod=byrequests stickysession=BRMSWAFID
</Proxy>

<VirtualHost *:80>
  ServerName localhost
  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "http"

  RedirectMatch 404 ^/actuator(/|$)

  ProxyPass        /api/ balancer://waf_cluster/api/
  ProxyPassReverse /api/ balancer://waf_cluster/api/

  # Persist the deterministic assignment to client for sticky continuity.
  Header add Set-Cookie "BRMSWAFID=.%{CANARY_ROUTE_ASSIGNED}e; Path=/; HttpOnly; SameSite=Lax" env=CANARY_ROUTE_ASSIGNED

  Header always set X-Canary-Router "hash-deterministic-sticky"
  Header always set X-Canary-Block-Percent "%{CANARY_BLOCK_PERCENT}e" env=CANARY_BLOCK_PERCENT
  Header always set X-Canary-Mode "%{CANARY_MODE}e" env=CANARY_MODE
  Header always set X-Canary-Override "%{CANARY_OVERRIDE}e" env=CANARY_OVERRIDE
  Header always set X-Canary-Bucket "%{CANARY_BUCKET}e" env=CANARY_BUCKET
  Header always set X-Canary-Key-Source "%{CANARY_KEY_SOURCE}e" env=CANARY_KEY_SOURCE
</VirtualHost>
