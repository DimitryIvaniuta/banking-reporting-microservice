# Private management vhost (bind published to localhost only in docker-compose)
# Exposes actuator for local/admin usage while keeping it off the public edge vhost.
<VirtualHost *:9090>
    ServerName localhost

    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "9090"
    RequestHeader unset Proxy early

    # Only local/admin access (container-side localhost + docker bridge; host publication is 127.0.0.1 only)
    <Location "/actuator/health">
        ProxyPass        http://host.docker.internal:8080/actuator/health retry=0 connectiontimeout=2 timeout=5
        ProxyPassReverse http://host.docker.internal:8080/actuator/health
        Require all granted
    </Location>

    <Location "/actuator/prometheus">
        ProxyPass        http://host.docker.internal:8080/actuator/prometheus retry=0 connectiontimeout=2 timeout=10
        ProxyPassReverse http://host.docker.internal:8080/actuator/prometheus
        Require all granted
    </Location>

    <Location "/actuator/info">
        ProxyPass        http://host.docker.internal:8080/actuator/info retry=0 connectiontimeout=2 timeout=5
        ProxyPassReverse http://host.docker.internal:8080/actuator/info
        Require all granted
    </Location>

    # Optionally proxy full actuator only for localhost inside container (disabled by default)
    <Location "/actuator/">
        Require all denied
    </Location>

    <Location "/">
        Require all denied
    </Location>
</VirtualHost>
