# Public edge vhosts: HTTP -> HTTPS redirect and HTTPS app traffic only (NO /actuator)
<VirtualHost *:80>
    ServerName localhost
    RewriteEngine On
    RewriteRule ^/(.*)$ https://localhost/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost

    SSLEngine on
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder off
    SSLCompression off
    SSLSessionTickets off
    SSLUseStapling off

    SSLCertificateFile /usr/local/apache2/conf/certs/dev-localhost.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/certs/dev-localhost.key

    ProxyRequests Off
    ProxyPreserveHost On
    SSLProxyEngine Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader unset Proxy early

    # Security headers (banking-oriented defaults, app/API only)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Cross-Origin-Resource-Policy "same-origin"
    Header always set X-XSS-Protection "0"
    Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'"

    # Request hardening
    LimitRequestBody 10485760
    LimitRequestFields 50
    LimitRequestFieldSize 8190

    # Example response bandwidth throttling for large downloads (not per-IP request limiting)
    SetEnvIfNoCase Request_URI "^/api/reports/.+/export$" rate-limit=512
    SetOutputFilter RATE_LIMIT

    # Public API only
    ProxyPass        /api/ http://host.docker.internal:8080/api/ retry=0 connectiontimeout=5 timeout=30
    ProxyPassReverse /api/ http://host.docker.internal:8080/api/

    # Explicitly hide management endpoints on public vhost
    <Location "/actuator">
        Require all denied
    </Location>
    <Location "/actuator/">
        Require all denied
    </Location>

    # Default deny everything else
    <Location "/">
        Require all denied
    </Location>
</VirtualHost>
