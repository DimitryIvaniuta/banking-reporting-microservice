server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: modsecurity-audit
    static_configs:
      - targets: [localhost]
        labels:
          job: modsecurity-audit
          __path__: /var/log/modsecurity/*.log
    pipeline_stages:
      - json:
          expressions:
            tx: transaction
      - labels:
          job:
