server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/promtail-modsec-positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: modsecurity-audit
    static_configs:
      - targets: [localhost]
        labels:
          job: modsecurity-audit
          app: banking-reporting-microservice
          __path__: /var/log/modsecurity/*.log
    pipeline_stages:
      - json:
          expressions:
            transaction: transaction
      - json:
          source: transaction
          expressions:
            client_ip: client_ip
            request: request
      - json:
          source: request
          expressions:
            uri: uri
      - labels:
          client_ip:
          uri:
