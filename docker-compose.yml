version: '3.9'
services:
  postgres:
    image: postgres:17
    environment: { POSTGRES_DB: banking_reporting, POSTGRES_USER: banking, POSTGRES_PASSWORD: banking }
    ports: ['5432:5432']

  redis:
    image: redis:7.4
    ports: ['6379:6379']

  kafka:
    image: bitnami/kafka:4.1
    ports: ['9092:9092']
    environment:
      KAFKA_ENABLE_KRAFT: 'yes'
      KAFKA_CFG_NODE_ID: '1'
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: 'yes'

  apache-httpd:
    image: httpd:2.4
    ports:
      - '8088:80'
      - '8443:443'
      - '127.0.0.1:9090:9090'
    volumes:
      - ./apache/httpd-local.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/conf.d/vhosts-public.conf:/usr/local/apache2/conf/extra/vhosts-public.conf:ro
      - ./apache/conf.d/vhosts-private.conf:/usr/local/apache2/conf/extra/vhosts-private.conf:ro
      - ./apache/certs:/usr/local/apache2/conf/certs:ro
      - ./apache/modsecurity/modsecurity.conf.template:/usr/local/apache2/conf/extra/modsecurity.conf.template:ro
    extra_hosts:
      - host.docker.internal:host-gateway

  apache-httpd-waf-detect:
    build:
      context: .
      dockerfile: apache/waf/Dockerfile
    env_file:
      - ./apache/waf/profiles/waf-detection.env
    environment:
      BACKEND: http://host.docker.internal:8080
      SERVERNAME: localhost
      PORT: '8080'
      SSL_PORT: '8443'
      PROXY: '1'
      PARANOIA: '1'
      BLOCKING_PARANOIA: '1'
      ANOMALY_INBOUND: '10000'
      ANOMALY_OUTBOUND: '10000'
      SSL_CERT_FILE: /usr/local/apache2/conf/certs/dev-localhost.crt
      SSL_CERT_KEY_FILE: /usr/local/apache2/conf/certs/dev-localhost.key
    ports:
      - '8089:8080'
      - '8444:8443'
    volumes:
      - ./apache/certs:/usr/local/apache2/conf/certs:ro
      - ./apache/waf/logs:/var/log/modsecurity:rw
      - ./apache/waf/conf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ./apache/waf/conf/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    extra_hosts:
      - host.docker.internal:host-gateway

  apache-httpd-waf-block:
    build:
      context: .
      dockerfile: apache/waf/Dockerfile
    env_file:
      - ./apache/waf/profiles/waf-blocking-canary.env
    environment:
      BACKEND: http://host.docker.internal:8080
      SERVERNAME: localhost
      PORT: '8080'
      SSL_PORT: '8443'
      PROXY: '1'
      PARANOIA: '1'
      BLOCKING_PARANOIA: '1'
      ANOMALY_INBOUND: '10000'
      ANOMALY_OUTBOUND: '10000'
      SSL_CERT_FILE: /usr/local/apache2/conf/certs/dev-localhost.crt
      SSL_CERT_KEY_FILE: /usr/local/apache2/conf/certs/dev-localhost.key
    ports:
      - '8091:8080'
      - '8445:8443'
    volumes:
      - ./apache/certs:/usr/local/apache2/conf/certs:ro
      - ./apache/waf/logs:/var/log/modsecurity:rw
      - ./apache/waf/conf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ./apache/waf/conf/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    extra_hosts:
      - host.docker.internal:host-gateway

  apache-canary-router:
    image: httpd:2.4
    depends_on:
      - apache-httpd-waf-detect
      - apache-httpd-waf-block
    ports:
      - '8090:80'
    volumes:
      - ./apache/canary-router/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro


  apache-canary-router-hash:
    image: httpd:2.4
    depends_on:
      - apache-httpd-waf-detect
      - apache-httpd-waf-block
    ports:
      - '8092:80'
    volumes:
      - ./apache/canary-router/httpd-hash.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/canary-router/lua:/usr/local/apache2/conf/lua:ro

  modsec-exporter:
    build:
      context: .
      dockerfile: observability/modsec-exporter/Dockerfile
    environment:
      MODSEC_AUDIT_GLOB: /var/log/modsecurity/*.log
      SCAN_INTERVAL_SECONDS: '10'
    volumes:
      - ./apache/waf/logs:/var/log/modsecurity:ro
    ports:
      - '9910:9910'

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - modsec-exporter
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9091:9090'

  loki:
    image: grafana/loki:3.4.2
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - '3100:3100'

  promtail:
    image: grafana/promtail:3.4.2
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/promtail-modsecurity-local.yaml:/etc/promtail/config.yml:ro
      - ./apache/waf/logs:/var/log/modsecurity:ro

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3000:3000'
