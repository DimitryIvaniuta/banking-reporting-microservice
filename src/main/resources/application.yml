spring:
  application:
    name: banking-reporting-microservice
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_reporting
    username: banking
    password: banking
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
server:
  port: 8080
management:
  endpoints.web.exposure.include: health,info,metrics,prometheus,env,loggers
  endpoint.health:
    show-details: always
    probes.enabled: true
logging.level.com.example.banking.reporting: INFO

app:
  security:
    users:
      - username: report_viewer
        password: changeit-viewer
        roles: [REPORT_VIEWER]
      - username: report_admin
        password: changeit-admin
        roles: [REPORT_VIEWER, REPORT_ADMIN]
